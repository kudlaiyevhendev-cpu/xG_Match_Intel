services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: xgintel
      POSTGRES_USER: xgintel
      POSTGRES_PASSWORD: xgintel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xgintel"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/xgintel
      DB_USER: xgintel
      DB_PASSWORD: xgintel
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LLM_PROVIDER: ${LLM_PROVIDER:-stub}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-5}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      FOOTBALL_DATA_TOKEN: ${FOOTBALL_DATA_TOKEN:-}
    ports:
      - "8080:8080"

volumes:
  pgdata:
