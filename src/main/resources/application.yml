spring:
  application:
    name: xg-match-intel
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/xgintel}
    username: ${DB_USER:xgintel}
    password: ${DB_PASSWORD:xgintel}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# Agent layer configuration
xgintel:
  llm:
    provider: ${LLM_PROVIDER:stub}   # stub | anthropic
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      model: ${LLM_MODEL:claude-sonnet-5}
