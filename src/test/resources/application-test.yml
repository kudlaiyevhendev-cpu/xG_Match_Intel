# Test profile: no external services required.
# H2 in-memory DB (schema generated by Hibernate), in-memory cache, stub LLM.
spring:
  datasource:
    url: jdbc:h2:mem:xgintel;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  cache:
    type: simple

xgintel:
  llm:
    provider: stub
